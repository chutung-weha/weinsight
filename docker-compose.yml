services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL
        - DIRECT_URL
        - NEXTAUTH_SECRET
        - NEXTAUTH_URL
        - GROQ_API_KEY
        - GOOGLE_CLIENT_ID
        - GOOGLE_CLIENT_SECRET
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    environment:
      - GOOGLE_CLIENT_SECRET
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
